name: tap-ci

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  validate:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Tap local repository
        run: |
          brew untap avchaykin/tap || true
          brew tap avchaykin/tap "$GITHUB_WORKSPACE"

      - name: Run brew audit
        run: |
          brew audit --strict avchaykin/tap/liberte-graph-v2
          brew audit --strict avchaykin/tap/screenshot-describer

      - name: Install and smoke-test screenshot-describer formula
        run: |
          brew install --build-from-source --formula avchaykin/tap/screenshot-describer
          test -x "$(brew --prefix)/opt/screenshot-describer/bin/screenshot-describer"
