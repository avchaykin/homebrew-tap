name: tap-ci

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  validate:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Tap local repository
        run: |
          brew untap avchaykin/tap || true
          brew tap avchaykin/tap "$GITHUB_WORKSPACE"

      - name: Run brew audit
        run: |
          brew audit --strict avchaykin/tap/liberte-graph-v2
          brew audit --cask --strict avchaykin/tap/screenshot-describer

      - name: Install and smoke-test formula
        run: |
          brew install --build-from-source avchaykin/tap/liberte-graph-v2
          liberte-graph-v2 --help

      - name: Install cask
        run: brew install --cask avchaykin/tap/screenshot-describer
