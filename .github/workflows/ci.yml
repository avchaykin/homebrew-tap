name: tap-ci

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  validate:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Homebrew
        uses: Homebrew/actions/setup-homebrew@master

      - name: Run brew audit
        run: |
          brew audit --strict Formula/liberte-graph-v2.rb
          brew audit --cask --strict Casks/screenshot-describer.rb

      - name: Install and smoke-test formula
        run: |
          brew install --build-from-source ./Formula/liberte-graph-v2.rb
          liberte-graph-v2 --help

      - name: Install cask
        run: brew install --cask ./Casks/screenshot-describer.rb
